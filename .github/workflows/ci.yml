name: CI Pipeline

on:
  push:
    branches: ["main", "chaos-drill" ]
  pull_request:
    branches: ["main", "chaos-drill"]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hackathon_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Dependencies
        # Added pytest-cov explicitly just in case it's not in your pyproject.toml
        run: |
          uv sync
          uv add pytest-cov 

      - name: Run Tests with Coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hackathon_db
        run: |
          uv run pytest --cov=app --cov-fail-under=70 --cov-report=term-missing