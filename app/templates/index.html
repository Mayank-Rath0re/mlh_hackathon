<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLH Shortener</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">

    <div class="max-w-lg w-full bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-2">TrimURL</h1>
        <p class="text-center text-gray-500 mb-8">Paste your long link below to shorten it.</p>

        <form id="shorten-form" class="space-y-4">
            <div>
                <input type="url" id="original-url" required placeholder="https://super-long-url.com/..."
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition duration-200">
                Shorten URL
            </button>
        </form>

        <div id="result-area" class="mt-8 hidden">
            <div class="p-4 bg-green-50 border border-green-200 rounded-lg text-center">
                <p class="text-sm text-green-800 mb-2">Success! Here is your short link:</p>
                <div class="flex items-center justify-center space-x-2">
                    <a id="short-link" href="#" target="_blank"
                        class="text-lg font-bold text-blue-600 hover:underline"></a>
                    <button id="copy-btn"
                        class="p-2 bg-gray-200 hover:bg-gray-300 rounded text-sm font-medium transition">
                        Copy
                    </button>
                </div>
            </div>
        </div>

        <div id="error-area" class="mt-4 hidden text-center text-red-600 text-sm"></div>
    </div>
    <script>
        const form = document.getElementById('shorten-form');
        const input = document.getElementById('original-url');
        const resultArea = document.getElementById('result-area');
        const shortLink = document.getElementById('short-link');
        const copyBtn = document.getElementById('copy-btn');
        const errorArea = document.getElementById('error-area');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page reload

            // Reset UI states
            resultArea.classList.add('hidden');
            errorArea.classList.add('hidden');

            const urlToShorten = input.value;

            try {
                // Call your Flask API
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ original_url: urlToShorten })
                });

                const data = await response.json();

                if (response.ok) {
                    // Construct the full short URL (e.g., http://localhost:5000/aB3dE)
                    const fullShortUrl = `${window.location.origin}/${data.short_code}`;

                    // Update UI
                    shortLink.href = fullShortUrl;
                    shortLink.textContent = fullShortUrl;
                    resultArea.classList.remove('hidden');
                    input.value = ''; // Clear the input
                } else {
                    // Handle API errors
                    errorArea.textContent = data.error || "Something went wrong.";
                    errorArea.classList.remove('hidden');
                }
            } catch (err) {
                errorArea.textContent = "Failed to connect to the server.";
                errorArea.classList.remove('hidden');
            }
        });

        // Copy to clipboard functionality
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(shortLink.textContent).then(() => {
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        });
    </script>
</body>

</html>
